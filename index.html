    --panel:     rgba(18,18,21,0.66);
    --panel-2:   rgba(28,28,32,0.72);
    --line:      rgba(255,255,255,0.10);
    --line-soft: rgba(255,255,255,0.06);
    --text:      #F5F5F6;
    --muted:     #9A9AA3;
    --orange:    #FF7A18;
    --orange-2:  #F2431E;
    --danger:    #E5484D;
    --display: "Archivo", system-ui, sans-serif;
    --body: "Inter", system-ui, sans-serif;
    --mono: "Spline Sans Mono", ui-monospace, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--body);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    background:
      linear-gradient(180deg, rgba(11,11,13,0.74) 0%, rgba(11,11,13,0.90) 55%, rgba(11,11,13,0.96) 100%),
      var(--banner) center / cover no-repeat fixed,
      var(--bg);
  }

  .wrap { max-width: 920px; margin: 0 auto; padding: 64px 24px 96px; }

  /* --- Glass content panel --- */
  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 40px;
    -webkit-backdrop-filter: blur(18px);
    backdrop-filter: blur(18px);
    box-shadow: 0 24px 60px rgba(0,0,0,0.45);
  }

  /* --- Header --- */
  header { border-bottom: 1px solid var(--line); padding-bottom: 26px; }
  .eyebrow {
    font-family: var(--display);
    font-weight: 800;
    font-size: 13px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 8px;
  }
  h1 {
    font-family: var(--display);
    font-weight: 900;
    font-size: clamp(32px, 6vw, 52px);
    letter-spacing: -0.02em;
    line-height: 0.98;
    text-transform: uppercase;
  }
  h1 .accent {
    background: linear-gradient(92deg, var(--orange) 0%, var(--orange-2) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* --- Notice banner --- */
  .notice {
    margin-top: 22px;
    padding: 12px 16px;
    border: 1px solid rgba(255,122,24,0.4);
    background: rgba(255,122,24,0.10);
    border-radius: 10px;
    color: #FFD8B0;
    font-size: 13px;
    line-height: 1.5;
  }

  /* --- Toolbar / upload --- */
  .toolbar { display: flex; align-items: center; flex-wrap: wrap; gap: 12px; margin: 26px 0 4px; }
  .upload-btn {
    font-family: var(--display);
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.02em;
    color: #fff;
    background: linear-gradient(92deg, var(--orange) 0%, var(--orange-2) 100%);
    border: none;
    border-radius: 10px;
    padding: 12px 22px;
    cursor: pointer;
    box-shadow: 0 8px 22px rgba(242,67,30,0.32);
    transition: transform 0.12s, box-shadow 0.15s, filter 0.15s;
  }
  .upload-btn:hover { filter: brightness(1.06); box-shadow: 0 10px 28px rgba(242,67,30,0.42); }
  .upload-btn:active { transform: translateY(1px); }
  .upload-btn:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }
  .upload-btn:disabled { opacity: 0.6; cursor: default; box-shadow: none; filter: none; }

  /* --- Tabs --- */
  .tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 26px; }
  .tab {
    font-family: var(--body);
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 9px 18px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tab:hover { color: var(--text); border-color: rgba(255,122,24,0.6); }
  .tab[aria-pressed="true"] {
    color: #fff;
    background: linear-gradient(92deg, var(--orange) 0%, var(--orange-2) 100%);
    border-color: transparent;
  }
  .tab:focus-visible { outline: 2px solid var(--orange); outline-offset: 2px; }

  /* --- Report rows --- */
  .list { list-style: none; }
  .row {
    display: grid;
    grid-template-columns: 72px 1fr auto;
    gap: 20px;
    align-items: center;
    padding: 22px 0;
    border-bottom: 1px solid var(--line-soft);
  }
  .idx { font-family: var(--mono); font-size: 13px; color: var(--orange); }
  .row h2 {
    font-family: var(--display);
    font-weight: 700;
    font-size: 18px;
    letter-spacing: -0.01em;
    word-break: break-word;
  }
  .meta {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    margin-top: 5px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .desc { color: var(--muted); font-size: 14px; margin-top: 8px; max-width: 56ch; }

  .actions { display: flex; gap: 8px; align-items: center; }
  .open, .delete {
    font-family: var(--body);
    font-size: 14px;
    font-weight: 600;
    border-radius: 9px;
    padding: 9px 16px;
    white-space: nowrap;
    cursor: pointer;
    transition: all 0.15s;
  }
  .open {
    color: var(--orange);
    text-decoration: none;
    background: transparent;
    border: 1px solid rgba(255,122,24,0.45);
  }
  .open:hover { background: var(--orange); color: #111; border-color: var(--orange); }
  .delete {
    color: var(--muted);
    background: transparent;
    border: 1px solid var(--line);
  }
  .delete:hover { background: var(--danger); color: #fff; border-color: var(--danger); }
  .open:focus-visible { outline: 2px solid var(--orange); outline-offset: 2px; }
  .delete:focus-visible { outline: 2px solid var(--danger); outline-offset: 2px; }

  /* --- Mobile --- */
  @media (max-width: 640px) {
    .panel { padding: 26px 20px; }
    .row { grid-template-columns: 1fr; gap: 8px; }
    .idx { order: -1; }
    .actions { justify-self: start; margin-top: 10px; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <header>
        <div class="eyebrow">Clapper</div>
        <h1>Report <span class="accent">Analysis</span></h1>
      </header>

      <div id="notice" class="notice" hidden></div>

      <div class="tabs" id="tabs" role="tablist" aria-label="Sections">
        <button class="tab" aria-pressed="true">Comments</button>
        <button class="tab" aria-pressed="false">Live Comments</button>
        <button class="tab" aria-pressed="false">Items</button>
        <button class="tab" aria-pressed="false">Users</button>
      </div>

      <div class="toolbar">
        <button class="upload-btn" id="uploadBtn" type="button">Upload files</button>
      </div>
      <input id="fileInput" type="file" multiple hidden>

      <ul id="list" class="list"></ul>
    </div>
  </div>

<script>
  /* =============================================================
     EDIT YOUR REPORTS HERE
     -------------------------------------------------------------
     Each report is one entry. Add a block for each report you have.
       title – the report name
       date  – any text you want shown (e.g. "Mar 2026")
       desc  – a one-line summary (optional, can be "")
       file  – path to the actual file, relative to this page
               e.g. "reports/q1-financials.pdf"
               (use a full https:// link if it lives elsewhere)
       tab   – which tab it belongs under. Must be one of:
               "Comments", "Live Comments", "Items", "Users"

     Example of one entry (copy this format into the list below):
       {
         title: "Q1 Financial Summary",
         date: "Mar 2026",
         desc: "Quarterly revenue and expenses overview.",
         file: "reports/q1-financial-summary.pdf",
         tab: "Items"
       }
     ============================================================= */
  const REPORTS = [

  ];
  /* ===================  END OF EDITABLE LIST  =================== */

  // --- Below this line is the logic. You don't need to edit it. ---

  /* =============================================================
     SHARED STORAGE SETUP — do this once so uploads are visible
     to everyone who visits the page (not just you).
     -------------------------------------------------------------
     A static webpage has no server, so we use Supabase (free) to
     store the files in the cloud and read them back on every visit.

     1. Go to https://supabase.com, sign up, create a new project.
     2. Storage > "New bucket" > name it exactly  reports
        and turn ON "Public bucket".
     3. SQL Editor > "New query" > paste and run this:

          create table reports (
            id uuid primary key default gen_random_uuid(),
            tab text not null,
            title text not null,
            path text not null,
            url text not null,
            created_at timestamptz default now()
          );
          alter table reports enable row level security;
          create policy "read"   on reports for select using (true);
          create policy "insert" on reports for insert with check (true);
          create policy "remove" on reports for delete using (true);

          create policy "files read"   on storage.objects
            for select using (bucket_id = 'reports');
          create policy "files insert" on storage.objects
            for insert with check (bucket_id = 'reports');
          create policy "files remove" on storage.objects
            for delete using (bucket_id = 'reports');

     4. Settings > API. Copy "Project URL" and the "anon public"
        key into the two lines just below.

     HEADS UP: the rules above make this a fully PUBLIC board —
     anyone who visits can upload AND delete. To lock that down
     later, add Supabase Auth and tighten the policies.
     ============================================================= */
  const SUPABASE_URL      = "https://uijxdsrlcgekhxychtxk.supabase.co";   // e.g. https://abcd1234.supabase.co
  const SUPABASE_ANON_KEY = "sb_publishable_xLtpI11seCQ0o22KjPYdiA_Q_oQUH3C";
  const BUCKET = "reports";

  const TABS = ["Comments", "Live Comments", "Items", "Users"];
  let activeTab = "Comments";

  const configured =
    /^https:\/\//.test(SUPABASE_URL) && SUPABASE_ANON_KEY.length > 30;
  const db = configured
    ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
    : null;

  // Static entries from the REPORTS list above (always shown), plus
  // any session-only uploads used while Supabase isn't configured yet.
  let localItems = REPORTS.map((r, i) => ({
    id: "seed-" + i,
    tab: TABS.includes(r.tab) ? r.tab : "Comments",
    title: r.title,
    url: r.file,
    date: r.date || "",
    desc: r.desc || ""
  }));
  // Entries loaded from Supabase — shared across ALL visitors.
  let remoteItems = [];

  const listEl    = document.getElementById("list");
  const noticeEl  = document.getElementById("notice");
  const uploadBtn = document.getElementById("uploadBtn");
  const fileInput = document.getElementById("fileInput");

  if (!configured) {
    noticeEl.hidden = false;
    noticeEl.textContent =
      "Shared storage isn't set up yet, so uploads stay on your device only. " +
      "Follow the SHARED STORAGE SETUP steps in this file to make them visible to everyone.";
  }

  // Tab buttons: clicking one selects it and shows that tab's files.
  document.querySelectorAll("#tabs .tab").forEach(tab => {
    tab.addEventListener("click", () => {
      activeTab = tab.textContent;
      document.querySelectorAll("#tabs .tab").forEach(t =>
        t.setAttribute("aria-pressed", t === tab));
      render();
    });
  });

  // Upload: sends files to Supabase (shared) when configured, otherwise
  // keeps them on this device for the current session only.
  uploadBtn.addEventListener("click", () => fileInput.click());

  fileInput.addEventListener("change", async () => {
    const files = [...fileInput.files];
    fileInput.value = "";
    if (!files.length) return;

    if (!configured) {
      const today = fmtMonth(new Date());
      files.forEach(file => localItems.push({
        id: "local-" + Date.now() + "-" + Math.random().toString(36).slice(2),
        tab: activeTab,
        title: file.name,
        url: URL.createObjectURL(file),
        date: today
      }));
      render();
      return;
    }

    setBusy(true, "Uploading…");
    try {
      for (const file of files) {
        const safe = file.name.replace(/[^a-zA-Z0-9._-]/g, "_");
        const path = activeTab.replace(/\s+/g, "-").toLowerCase()
                     + "/" + Date.now() + "-" + safe;
        const up = await db.storage.from(BUCKET).upload(path, file, {
          contentType: file.type || guessType(file.name),
          cacheControl: "3600",
          upsert: false
        });
        if (up.error) throw up.error;
        const url = db.storage.from(BUCKET).getPublicUrl(path).data.publicUrl;
        const ins = await db.from("reports")
          .insert({ tab: activeTab, title: file.name, path, url });
        if (ins.error) throw ins.error;
      }
      await loadRemote();
    } catch (err) {
      alert("Upload failed: " + (err.message || err));
    } finally {
      setBusy(false);
    }
  });

  // Load the shared files everyone can see.
  async function loadRemote() {
    if (!configured) { render(); return; }
    const { data, error } = await db.from("reports")
      .select("*").order("created_at", { ascending: true });
    if (error) {
      noticeEl.hidden = false;
      noticeEl.textContent = "Couldn't load shared files: " + error.message;
      render();
      return;
    }
    remoteItems = (data || []).map(row => ({
      id: row.id,
      tab: row.tab,
      title: row.title,
      url: row.url,
      path: row.path,
      shared: true,
      date: fmtMonth(new Date(row.created_at))
    }));
    render();
  }

  // Show the files for the active tab.
  function render() {
    const items = [...localItems, ...remoteItems].filter(f => f.tab === activeTab);
    listEl.innerHTML = "";
    items.forEach((r, i) => {
      const li = document.createElement("li");
      li.className = "row";
      const num = String(i + 1).padStart(3, "0");
      li.innerHTML = `
        <span class="idx">REP-${num}</span>
        <div>
          <h2>${escapeHtml(r.title)}</h2>
          <div class="meta">
            <span>${escapeHtml(activeTab)}</span>
            ${r.date ? `<span>${escapeHtml(r.date)}</span>` : ""}
            ${r.shared ? `<span>Shared</span>` : ""}
          </div>
          ${r.desc ? `<p class="desc">${escapeHtml(r.desc)}</p>` : ""}
        </div>
        <div class="actions">
          <a class="open" href="${encodeURI(r.url)}" target="_blank" rel="noopener">Open</a>
          <button class="delete" type="button" data-id="${escapeHtml(String(r.id))}">Delete</button>
        </div>
      `;
      listEl.appendChild(li);
    });
  }

  // Delete: removes from the cloud (for shared files) or from this
  // session (for local ones). Confirms first to avoid accidents.
  listEl.addEventListener("click", async (e) => {
    const btn = e.target.closest(".delete");
    if (!btn) return;
    const id = btn.dataset.id;
    const remote = remoteItems.find(f => String(f.id) === id);
    const local  = localItems.find(f => String(f.id) === id);
    const item = remote || local;
    if (!item) return;
    if (!confirm(`Delete "${item.title}"?`)) return;

    if (remote && configured) {
      setBusy(true, "Deleting…");
      try {
        const s = await db.storage.from(BUCKET).remove([item.path]);
        if (s.error) throw s.error;
        const d = await db.from("reports").delete().eq("id", item.id);
        if (d.error) throw d.error;
        await loadRemote();
      } catch (err) {
        alert("Delete failed: " + (err.message || err));
      } finally {
        setBusy(false);
      }
    } else {
      if (typeof item.url === "string" && item.url.startsWith("blob:")) {
        URL.revokeObjectURL(item.url);
      }
      localItems = localItems.filter(f => String(f.id) !== id);
      render();
    }
  });

  function setBusy(busy, label) {
    uploadBtn.disabled = busy;
    uploadBtn.textContent = busy ? (label || "Working…") : "Upload files";
  }

  function fmtMonth(d) {
    return d.toLocaleDateString(undefined, { month: "short", year: "numeric" });
  }

  // Some browsers leave file.type blank; infer a sensible type from the
  // extension so files (especially .html) open/render correctly.
  function guessType(name) {
    const ext = (name.split(".").pop() || "").toLowerCase();
    const map = {
      html: "text/html", htm: "text/html",
      css: "text/css", js: "text/javascript",
      json: "application/json", csv: "text/csv",
      txt: "text/plain", md: "text/markdown",
      pdf: "application/pdf",
      png: "image/png", jpg: "image/jpeg", jpeg: "image/jpeg",
      gif: "image/gif", webp: "image/webp", svg: "image/svg+xml"
    };
    return map[ext] || "application/octet-stream";
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, c =>
      ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
  }

  loadRemote();
</script>

</body>
