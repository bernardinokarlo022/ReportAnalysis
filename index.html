<!DOCTYPE html>
<html>
<head>
    <title>Report Analysis Dashboard</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: #38bdf8;
        }

        .container {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 15px;
            width: 250px;
            text-align: center;
        }

        .number {
            font-size: 40px;
            font-weight: bold;
            color: #38bdf8;
        }
    </style>
</head>
<body>

<h1>Live Comment Analysis Dashboard</h1>

<div class="container">
    <div class="card">
        <h3>Total Processed</h3>
        <div class="number">185</div>
    </div>

    <div class="card">
        <h3>No Risk</h3>
        <div class="number">75</div>
    </div>

    <div class="card">
        <h3>Against Rules</h3>
        <div class="number">98</div>
    </div>

    <div class="card">
        <h3>Against W/O</h3>
        <div class="number">12</div>
    </div>
</div>

</body>
</html>
